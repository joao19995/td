name: Godot Architect Review

on:
  push:
    branches:
      - main

jobs:
  architect-review:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Pega o commit atual e o anterior para fazer o diff

      - name: Run Godot Architect Agent Review
        id: review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Captura o diff das mudanças introduzidas neste push
          git diff HEAD~1 HEAD > mudancas.diff

          # 2. Monta o prompt estruturado enviando o diff para o Copilot
          cat << 'EOF' > prompt.txt
          Review the code changes introduced by this diff.

          Focus on:
          - Architecture violations (hardcoded gameplay values, deep node paths, logic in autoloads, missing composition, etc.)
          - C# implementation guardrails (naming, struct mutation, missing [GlobalClass], etc.)
          - Data-driven design (values that should be in .tres Resources but are hardcoded in .cs files)
          - Pooling issues (high-frequency objects not going through PoolManager)
          - Coupling concerns (wrong use of EventBus vs direct calls, or vice-versa)
          - Anything that will cause scaling problems with 20 towers, 30 enemies, 100 upgrades

          If you find real, concrete problems (not "cleaner in abstract" suggestions), produce a structured report with:
          - **Summary**: one-line description of the overall finding
          - **Issues**: a numbered list, each with file path, line number (if known), and a clear description of the problem and why it matters
          - **Verdict**: ISSUES_FOUND

          If no real problems are found, output exactly and only: Verdict: NO_ISSUES

          Here are the code changes:
          EOF
          
          cat mudancas.diff >> prompt.txt

          echo "🤖 Enviando dados para o Copilot Nativo..."
          
          # A CLI do gh copilot muitas vezes exige a flag antes do argumento 'explain' ou direto no escopo global do comando
          gh copilot explain -p "$(cat prompt.txt)" > resultado_copilot.md

          # 3. Passa o resultado para os outputs do step com delimitador de segurança
          echo "review_output<<EOF" >> $GITHUB_OUTPUT
          cat resultado_copilot.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Open issue if problems found
        if: contains(steps.review.outputs.review_output, 'ISSUES_FOUND')
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const actor = context.actor;
            const commit = context.payload.head_commit || {};
            const commitMsg = commit.message || '(no message)';
            const commitUrl = commit.url || '';
            const reviewOutput = process.env.REVIEW_OUTPUT || '';

            const body = `## 🏗️ Godot Architect Review — \`${sha.slice(0,7)}\`

            **Triggered by:** @${actor} — [${commitMsg}](${commitUrl})

            ${reviewOutput}

            ---
            *Auto-generated by the Godot Architect Agent on push to \`main\`.*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🏗️ Architect Review: issues found in ${context.sha.slice(0,7)}`,
              body,
              labels: ['architecture', 'needs-review'],
            });
        env:
          REVIEW_OUTPUT: ${{ steps.review.outputs.review_output }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
