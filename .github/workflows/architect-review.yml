name: Godot Architect Review

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  copilot-requests: write

jobs:
  architect-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install GitHub Copilot CLI
        run: |
          npm install -g @github/copilot
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Generate diff
        run: |
          git diff HEAD~1 HEAD > changes.diff

      - name: Create prompt
        run: |
          cat > prompt.txt <<'EOF'
          Review the code changes introduced by this diff.

          Focus on:

          - Architecture violations (hardcoded gameplay values, deep node paths, logic in autoloads, missing composition, etc.)
          - C# implementation guardrails (naming, struct mutation, missing [GlobalClass], etc.)
          - Data-driven design (values that should be in .tres Resources but are hardcoded in .cs files)
          - Pooling issues (high-frequency objects not going through PoolManager)
          - Coupling concerns (wrong use of EventBus vs direct calls, or vice-versa)
          - Anything that will cause scaling problems with 20 towers, 30 enemies, 100 upgrades

          If you find real, concrete problems (not abstract "cleaner code" suggestions), produce:

          ## Summary

          One-line summary.

          ## Issues

          Numbered list with:

          - File
          - Line
          - Description
          - Why it matters

          ## Verdict

          ISSUES_FOUND

          If there are no significant architectural issues output EXACTLY:

          Verdict: NO_ISSUES

          Here is the diff:

          EOF

          cat changes.diff >> prompt.txt

      - name: Run Copilot Review
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          copilot \
            -p "$(cat prompt.txt)" \
            -s \
            --no-ask-user \
            > review.md

          {
            echo "review<<EOF"
            cat review.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Issue
        if: contains(steps.review.outputs.review, 'ISSUES_FOUND')
        uses: actions/github-script@v7
        env:
          REVIEW: ${{ steps.review.outputs.review }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `
            ## 🏗️ Godot Architect Review

            **Commit:** ${context.sha}

            **Author:** @${context.actor}

            ---

            ${process.env.REVIEW}

            ---
            Generated automatically by GitHub Copilot.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🏗️ Architect Review ${context.sha.substring(0,7)}`,
              body,
              labels: [
                "architecture",
                "needs-review"
              ]
            });
